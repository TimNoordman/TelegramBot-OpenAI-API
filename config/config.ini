ederland en internationaal. V: Kan ik langskomen? A: Jazeker! U kunt een afspraak maken via info@stonemember.nl of bel +31 (0) 6 101 354 59. V: Wie is de contactpersoon? A: Tim Noordman is uw aanspreekpunt. V: Hoe kan ik een offerte aanvragen? A: Stuur uw tekeningen, specificaties, locatie en planning naar info@stonemember.nl of bel ons. V: In welke regio zijn jullie actief? A: Wij zijn actief in heel Nederland, met ons kantoor in Almere, Flevoland. We werken ook internationaal, onder andere in Duitsland."

